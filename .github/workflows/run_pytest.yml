name: Run Pytest on Push

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r .devcontainer/djangoapp/requirements.txt || true

      - name: Run pytest
        run: |
          mkdir -p reports
          cd djangoapp
          pytest --cov=. --cov-report=xml:../reports/coverage.xml --junitxml=../reports/pytest-report.xml

      - name: Upload Pytest Results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest-report.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/pytest-report.xml
