name: Run Pytest on Push

on:
  push:
    branches:
      - "**"

env:
  DJANGO_SETTINGS_MODULE: config.settings
  HOST: 127.0.0.1
  PORT: 5432
  SECRET_KEY: "your_secret_key_here"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r .devcontainer/djangoapp/requirements.txt || true

      - name: Run makemigrations
        run: |
          cd djangoapp
          python manage.py makemigrations --noinput

      - name: Run Migrations
        run: |
          cd djangoapp
          python manage.py migrate --noinput

      - name: Run pytest
        run: |
          mkdir -p ../reports
          cd djangoapp
          pytest --cov=. --cov-report=xml:../reports/coverage.xml --junitxml=../reports/pytest-report.xml

      - name: Upload Pytest Results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest-report.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/pytest-report.xml
