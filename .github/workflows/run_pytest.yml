name: Run Pytest on Push

on:
  push:
    branches:
      - "**"

env:
  DB_HOST: 127.0.0.1
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_NAME: postgres
  SECRET_KEY: "dummy_secret_key"
  DEBUG: "1"
  ALLOWED_HOSTS: "localhost"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db_myapp:
        image: postgres:alpine3.18
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r .devcontainer/djangoapp/requirements.txt || true

      - name: Run makemigrations
        run: |
          cd djangoapp
          python manage.py makemigrations --noinput

      - name: Run Migrations
        run: |
          cd djangoapp
          python manage.py migrate --noinput

      - name: Run pytest
        run: |
          mkdir -p ../reports
          cd djangoapp
          pytest --cov=. --cov-report=xml:../reports/coverage.xml --junitxml=../reports/pytest-report.xml

      - name: Upload Pytest Results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest-report.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/pytest-report.xml
